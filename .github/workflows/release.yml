name: 发布安装包

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "发布 tag，例如 v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: 构建 Windows 安装包
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 运行测试
        run: pnpm test

      - name: 构建安装包
        run: pnpm tauri build

      - name: 整理安装包文件名
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $tag.TrimStart("v")
          $source = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*setup.exe" | Select-Object -First 1
          if (-not $source) {
            throw "未找到 NSIS 安装包"
          }
          New-Item -ItemType Directory -Path "release-assets" -Force | Out-Null
          Copy-Item $source.FullName "release-assets/codex-usage-ball_${version}_x64-setup.exe" -Force

      - name: 上传 Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --target $env:GITHUB_SHA --title "Codex 用量悬浮球 $tag" --notes "自动构建的 Windows 安装包。"
          }
          gh release upload $tag "release-assets/codex-usage-ball_$($tag.TrimStart('v'))_x64-setup.exe" --clobber
